# Local production-parity run.
#   docker compose up --build      -> http://localhost:5050
# Data persists in the named volume "staysathi-data" across restarts.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: staysathi:local
    container_name: staysathi
    ports:
      - "5050:5050"
    environment:
      NODE_ENV: production
      PORT: 5050
      DATA_DIR: /data
      # Override the seeded admin — NEVER ship the defaults to production.
      ADMIN_PHONE: ${ADMIN_PHONE:-9999999999}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      APP_VERSION: ${APP_VERSION:-dev}
    volumes:
      - staysathi-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:5050/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  staysathi-data:
