name: CD

# Publishes a versioned container image to GitHub Container Registry (GHCR)
# on every push to main, then optionally triggers a Render deploy.
on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=long
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=${{ github.sha }}

  deploy-render:
    name: Trigger Render deploy
    needs: publish
    runs-on: ubuntu-latest
    # Only runs if you've added a RENDER_DEPLOY_HOOK_URL secret; otherwise skipped.
    if: ${{ github.event_name == 'push' }}
    steps:
      - name: Call Render deploy hook
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "No RENDER_DEPLOY_HOOK_URL secret set — skipping."
            echo "Render also auto-deploys from render.yaml, so this is optional."
            exit 0
          fi
          curl -fsSL -X POST "$HOOK" && echo "Render deploy triggered."
