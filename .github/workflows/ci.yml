name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install server deps
        run: npm ci
        working-directory: server

      - name: Install client deps
        run: npm ci
        working-directory: client

      - name: Build frontend
        run: npm run build
        working-directory: client

      - name: Verify frontend build output
        run: test -f client/dist/index.html

      - name: Smoke test the server (/health)
        env:
          PORT: "5050"
          DATA_DIR: ${{ runner.temp }}/data
        run: |
          node server/server.js &
          SERVER_PID=$!
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:5050/health > /dev/null; then
              echo "Server is healthy"; break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:5050/health | tee /dev/stderr | grep -q '"status":"ok"'
          kill $SERVER_PID

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: staysathi:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test the built image
        run: |
          docker run -d --name staysathi -p 5050:5050 staysathi:ci
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:5050/health > /dev/null; then
              echo "Container is healthy"; break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:5050/health | grep -q '"status":"ok"'
          docker rm -f staysathi
