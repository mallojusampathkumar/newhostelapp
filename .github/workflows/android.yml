name: Android (Play Store bundle)

# Builds the Trusted Web Activity into an Android App Bundle (.aab) for the
# Play Store, plus a universal .apk you can sideload to test on a phone.
#
# Runs on demand, and automatically when you push a version tag like v1.0.0.
# The signed .aab is produced only when the signing secrets below are set;
# without them it still builds an (unsigned/debug-signed) bundle so PRs stay green.
#
# Repo secrets required for a *signed* release (Settings → Secrets → Actions):
#   ANDROID_KEYSTORE_BASE64    base64 of your upload keystore (.jks)
#                                base64 -w0 staysathi-upload.jks | pbcopy
#   ANDROID_KEYSTORE_PASSWORD  keystore password
#   ANDROID_KEY_ALIAS          key alias (e.g. staysathi)
#   ANDROID_KEY_PASSWORD       key password

on:
  workflow_dispatch:
  push:
    tags: ["v*"]
    paths: ["android/**", ".github/workflows/android.yml"]

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bundle:
    name: Build .aab + .apk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Decode signing keystore
        id: keystore
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KS_B64" ]; then
            echo "$KS_B64" | base64 -d > "$RUNNER_TEMP/upload.jks"
            echo "have_signing=true" >> "$GITHUB_OUTPUT"
          else
            echo "No signing secrets set — building an unsigned/debug bundle."
            echo "have_signing=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release bundle & apk
        working-directory: android
        env:
          ANDROID_KEYSTORE_FILE: ${{ steps.keystore.outputs.have_signing == 'true' && format('{0}/upload.jks', runner.temp) || '' }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon bundleRelease assembleRelease

      - name: Upload .aab (Play Store upload artifact)
        uses: actions/upload-artifact@v4
        with:
          name: staysathi-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Upload .apk (sideload to test on a phone)
        uses: actions/upload-artifact@v4
        with:
          name: staysathi-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
